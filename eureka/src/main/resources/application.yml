server:
  port: 8761
  error:
    include-stacktrace: never

spring:
  application:
    name: eureka-server

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
  server:
    wait-time-in-ms-when-sync-empty: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: eureka-server
    version: 0.0.1
    description: Servidor de Descubrimiento Eureka - Aduanas

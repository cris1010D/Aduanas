    build:
      context: ./ms-monitoreo
      dockerfile: Dockerfile
    image: aduanas/ms-monitoreo:latest
    container_name: aduanas-ms-monitoreo
    restart: unless-stopped
    depends_on:
      eureka:
        condition: service_healthy
    ports:
      - "9009:9009"
    environment:
      SERVER_PORT: 9009
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://aduanas-eureka:8761/eureka
      JWT_SECRET: ${JWT_SECRET:-dG9rZW5TZWNyZXRLZXlBZHVhbmFzMjAyNlRyaXNrZWxlZHVTZWN1cml0eUZyb250ZXJpem8=}
